name: Build and publish CV

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CV source
        uses: actions/checkout@v6

      - name: Compile LaTeX CV to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex

      - name: Upload built CV as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Everest_KC_CV
          path: main.pdf

      - name: Convert LaTeX to HTML fragment
        run: |
          sudo apt-get install -y pandoc
          pandoc main.tex \
            --from=latex \
            --to=html5 \
            --no-highlight \
            -o cv-fragment.html

      - name: Checkout personal website
        uses: actions/checkout@v6
        with:
          repository: everestkc/everestkc.github.io
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Copy CV assets to website
        run: |
          mkdir -p website/public/assets/pdf
          mkdir -p website/src/data/
          cp main.pdf website/public/assets/pdf/Everest_KC_CV.pdf

          cp cv-fragment.html website/src/data/cv-content.html

      - name: Commit and push website updates
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/assets/pdf/Everest_KC_CV.pdf src/data/cv-content.html

          if git diff --cached --quiet; then
            echo "No CV changes to publish."
            exit 0
          fi

          git commit -m "Update CV from Overleaf"
          git push
